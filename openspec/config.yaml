schema: spec-driven

context: |
  Monorepo: NestJS API, React Native mobile, Next.js web, TypeScript.
  Follow RED -> GREEN -> REFACTOR for behavior changes.
  API tests are destructive and require an explicitly disposable TEST_DATABASE_URL.
  OpenSpec specs and changes are canonical planning artifacts.
  The repository workflow engine, Git hooks, and CI own execution assurance.
  Spectra is retained but must not be invoked or used by the workflow.

rules:
  proposal:
    - Include explicit scope and non-goals.
    - Link the roadmap item or issue that motivated the change.
  design:
    - State trust boundaries, failure behavior, and evidence for guard changes.
    - Do not duplicate normative requirements from delta specs.
  tasks:
    - Keep tasks small enough to verify independently.
    - Put descriptions in tasks.md and machine path/check policy only in guard.json.
    - A checked task is a projection; execution evidence is authoritative.
